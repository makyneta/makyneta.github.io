<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Makyneta Unipessoal, Lda."/>
    <meta property="og:image" content="https://makyneta.github.io/assets/images/ui/og-image.jpg">
    <meta name="twitter:image" content="https://makyneta.github.io/assets/images/ui/og-image.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../assets/styles/geral.css">
    <link rel="stylesheet" href="../assets/styles/video.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/scripts/video.js" defer></script>
    <script src="../assets/scripts/script.js"></script>
    <title>Vídeo | Makyneta</title>
    <link rel="icon" href="../assets/images/ui/favicon.png" type="image/png">
</head>
<body>
  <div id="bar"></div>
  <div id="cx"></div>
  <div id="cy"></div>
  <div id="header"></div>

  <main>
    <section id="page-hero">
      <div class="hero-ghost">VÍDEO</div>
      <div class="eyebrow"><span>Portfolio — Vídeo</span></div>
      <h1 class="hero-title">VÍ<span class="outline">DEO</span></h1>
      <div class="hero-foot">
        <p class="hero-lead">
          Motion, edição e conteúdo curto — de cobertura de eventos
          a storytelling.
        </p>
      </div>
    </section>

    <section id="video-section" class="reveal">
      <div class="video-grid" id="video-grid"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    const VIDEOS = [
  {
    title: 'Apresentação da Candidatura de Ridardo Lopes',
    desc: 'Video de apresentação da candidatura de Ricardo Lopes à Comissão Política do Partido Socialista da Marinha Grande.',
    embed: 'https://www.youtube.com/embed/Igmi2JkPEwk',
    thumbnail: '../assets/images/projects/video/apresentacao-ricardo-lopes-2026.jpg',
    link: 'https://youtu.be/Igmi2JkPEwk'
  },
];

    function renderVideos() {
      const grid = document.getElementById('video-grid');
      if (!grid) return;
      if (!VIDEOS.length) return;
      grid.innerHTML = VIDEOS.map(v => `
        <a class="v-card" href="${v.link}" target="_blank" rel="noopener">
          <div class="v-thumb-wrap">
            <img class="v-thumb" src="${v.thumbnail}" alt="${v.title}" loading="lazy">
            <div class="v-play">
              <div class="v-play-btn"></div>
            </div>
          </div>
          <div class="v-body">
            <div class="v-title">${v.title}</div>
            ${v.desc ? `<div class="v-desc">${v.desc}</div>` : ''}
            <span class="v-link">Ver projeto →</span>
          </div>
        </a>
      `).join('');
    }

    renderVideos();
  </script>
</body>
</html>
