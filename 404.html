<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Makyneta Unipessoal, Lda."/>
    <meta name="robots" content="noindex, nofollow">
    <!-- OG Tags -->
    <meta property="og:type" content="website">
    <meta property="og:image" id="og-image-tag" content="assets/images/branding/og-image.png">
    <!-- Title_Favicon -->
    <title>Makyneta - 404</title>
    <link rel="icon" href="/assets/images/ui/favicon.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:      #0f0f0f;
            --bg2:     #1a1a1a;
            --accent:  #d4af37;
            --fg:      #ffffff;
            --dim:     #b0b0b0;
            --border:  rgba(212,175,55,0.15);
            --font-display: 'Bebas Neue', sans-serif;
            --font-serif:   'Cormorant Garamond', serif;
            --font-mono:    'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-mono);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .noise {
            position: fixed; inset: 0; pointer-events: none; z-index: 500; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 4rem 2rem;
            max-width: 900px;
            animation: riseIn 0.9s ease 0.2s both;
        }

        /* ─── HERO ────────────────────────────────────────── */
        .hero-ghost {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            font-family: var(--font-display);
            font-size: clamp(8rem, 35vw, 20rem);
            color: transparent;
            -webkit-text-stroke: 1px rgba(212,175,55,0.08);
            pointer-events: none;
            line-height: 1;
            letter-spacing: 0.04em;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: riseIn 0.8s ease 0.4s forwards;
        }

        .eyebrow::before {
            content: '';
            width: 22px;
            height: 1px;
            background: var(--accent);
            display: block;
            box-shadow: 0 0 8px rgba(212,175,55,0.4);
        }

        .eyebrow span {
            font-family: var(--font-mono);
            font-size: 0.56rem;
            letter-spacing: 0.38em;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(5rem, 15vw, 12rem);
            line-height: 0.9;
            letter-spacing: 0.02em;
            color: var(--fg);
            margin-bottom: 1rem;
            opacity: 0;
            animation: riseIn 0.9s ease 0.5s forwards;
            text-shadow: 0 0 30px rgba(212,175,55,0.2);
        }

        .error-code em {
            color: transparent;
            font-style: normal;
            -webkit-text-stroke: 1.5px var(--accent);
        }

        .error-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            letter-spacing: 0.04em;
            color: var(--fg);
            line-height: 1;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: riseIn 0.9s ease 0.6s forwards;
        }

        .error-desc {
            font-family: var(--font-serif);
            font-size: 1rem;
            line-height: 1.9;
            color: rgba(255,255,255,0.6);
            font-weight: 300;
            margin-bottom: 3rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: riseIn 0.9s ease 0.7s forwards;
        }

        .language-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            opacity: 0;
            animation: riseIn 0.9s ease 0.8s forwards;
        }

        .lang-btn {
            font-family: var(--font-mono);
            font-size: 0.56rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(212,175,55,0.3);
            background: transparent;
            color: var(--dim);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover,
        .lang-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(212,175,55,0.1);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            background: var(--accent);
            color: #000;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.85rem 1.8rem;
            position: relative;
            overflow: hidden;
            transition: color 0.3s;
            opacity: 0;
            animation: riseIn 0.9s ease 0.9s forwards;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #ffffff;
            transform: translateX(-101%);
            transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
        }

        .btn-primary:hover {
            color: var(--accent);
        }

        .btn-primary:hover::before {
            transform: translateX(0);
        }

        .btn-primary span,
        .btn-arrow {
            position: relative;
            z-index: 1;
        }

        .btn-arrow {
            font-size: 1rem;
        }

        /* ─── ANIMATIONS ───────────────────────────────── */
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── RESPONSIVE ───────────────────────────────── */
        @media (max-width: 768px) {
            .container { padding: 3rem 1.5rem; }
            .error-code { font-size: clamp(3rem, 12vw, 6rem); }
            .error-title { font-size: clamp(1.3rem, 2.5vw, 2rem); }
            .error-desc { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <div class="container">
        <div class="hero-ghost">404</div>

        <div class="content">
            <div class="eyebrow">
                <span id="eyebrow-text">Error</span>
            </div>

            <h1 class="error-code">
                <span id="code-number">4</span><em id="code-accent">0</em><span id="code-number-2">4</span>
            </h1>

            <h2 class="error-title" id="error-title">Page Not Found</h2>

            <p class="error-desc" id="error-desc">
                The page you are looking for doesn't exist or has been moved.
                Go back to the home page to continue exploring.
            </p>

            <div class="language-selector">
                <button class="lang-btn active" data-lang="en" onclick="changeLanguage('en')">English</button>
                <button class="lang-btn" data-lang="pt" onclick="changeLanguage('pt')">Português</button>
                <button class="lang-btn" data-lang="es" onclick="changeLanguage('es')">Español</button>
                <button class="lang-btn" data-lang="ja" onclick="changeLanguage('ja')">日本語</button>
            </div>

            <a href="/" class="btn-primary">
                <span id="btn-text">Home</span>
                <span class="btn-arrow">→</span>
            </a>
        </div>
    </div>

    <script>
        // ── Redirect engine ──────────────────────────────────────
        const redirects = {
            'whatsapp': { url: 'https://wa.me/351933338431', label: 'WhatsApp' },
            'mail': { url: 'mailto:makynetastudios@gmail.com', label: 'Email' },
            'instagram': { url: 'https://www.instagram.com/makyneta_', label: 'Instagram' },
            'backerz': { url: 'https://backerz.me/makyneta', label: 'Backerz' },
            'github': { url: 'https://github.com/makyneta', label: 'GitHub' },
            'camg-download': { url: 'https://mega.nz/folder/YqIBQCgT#zevdmI5tDayVSijJasRUaA', label: "CAMG Download" },
            'jsmg-download': { url: 'https://mega.nz/folder/k7IVQSjR#0stw1G-2sIH5p-GSSAR4uA', label: "JSMG Download" },
            'mayday_design': { url: 'https://mega.nz/folder/RzIEkTBY#1viPYyuFvJ-XSPdMwelhKw', label: "MAYDAY's Design" },
            'penetraslive': { url: 'https://www.behance.net/gallery/232189175/Music-OP-Live-Performance-at-CDSS', label: "Penetras Live" },
            'songraiders': { url: 'https://www.behance.net/gallery/231746927/Music-SR-LIve-Performance-at-MG2024CF', label: 'Song Raiders' },
            'alpla': { url: 'https://www.behance.net/gallery/231766181/Sport-IA-Inter-Company-Tournament', label: 'ALPLA @ Inter-Company Tournament' },
            'listen': { url: 'https://lnkfi.re/makyneta', label: 'Listen to Makyneta' },
            'inmyblood': { url: 'https://lnkfi.re/inmyblood_', label: 'In My Blood' },
            'cuco': { url: 'https://cuco.inforlandia.pt/ucode/', label: 'Cuco' },
            'download': { url: 'https://mega.nz/folder/06JRwYJY#PcEXZZ-dltqD6tTHhNQv8A' },
            'adobe': { url: 'https://drive.google.com/drive/folders/1YuGFR7UCbF_2IRQiVvhfwbbZv3ae5joN', label: 'Adobe' },
        };

        // Executa redirect
        const slug = window.location.pathname.split('/').filter(Boolean).pop()?.toLowerCase();
        const match = slug && redirects[slug];

        if (match) {
            const meta = document.createElement('meta');
            meta.httpEquiv = 'refresh';
            meta.content = '0;url=' + match.url;
            document.head.appendChild(meta);
            window.location.replace(match.url);
        }

        // ── Language system ──────────────────────────────────────
        const translations = {
            en: {
                eyebrow: 'Error',
                title: 'Page Not Found',
                desc: 'The page you are looking for doesn\'t exist or has been moved. Go back to the home page to continue exploring.',
                btn: 'Home'
            },
            pt: {
                eyebrow: 'Erro',
                title: 'Página Não Encontrada',
                desc: 'A página que procura não existe ou foi movida. Volte à página inicial para continuar explorando.',
                btn: 'Início'
            },
            es: {
                eyebrow: 'Error',
                title: 'Página No Encontrada',
                desc: 'La página que buscas no existe o ha sido movida. Vuelve a la página de inicio para continuar explorando.',
                btn: 'Inicio'
            },
            ja: {
                eyebrow: 'エラー',
                title: 'ページが見つかりません',
                desc: 'お探しのページは存在しないか、移動しました。ホームページに戻って探索を続けてください。',
                btn: 'ホーム'
            }
        };

        function changeLanguage(lang) {
            const t = translations[lang];
            
            // Update text
            document.getElementById('eyebrow-text').textContent = t.eyebrow;
            document.getElementById('error-title').textContent = t.title;
            document.getElementById('error-desc').textContent = t.desc;
            document.getElementById('btn-text').textContent = t.btn;

            // Update active button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            // Update HTML lang
            document.documentElement.lang = lang;

            // Save preference
            localStorage.setItem('makyneta_language', lang);
        }

        // ── Load saved language or detect ──────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            let lang = localStorage.getItem('makyneta_language');
            
            if (!lang) {
                const browserLang = navigator.language.split('-')[0];
                lang = ['en', 'pt', 'es', 'ja'].includes(browserLang) ? browserLang : 'en';
            }

            changeLanguage(lang);
        });
    </script>
</body>
</html>
