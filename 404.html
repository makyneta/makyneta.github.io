    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --bg:    #070707;
          --bg2:   #0d0d0d;
          --bg3:   #131313;
          --white: #ede9e2;
          --w2:    #aaa79f;
          --dim:   #5c5a55;
          --gold:  #c8a450;
          --gold2: #dbb96a;
          --brd:   rgba(237,233,226,0.07);
          --brd2:  rgba(237,233,226,0.12);
          --fd:    'Bebas Neue', sans-serif;
          --fp:    'Playfair Display', serif;
          --fsc:   'Cormorant Garamond', serif;
          --fm:    'Fira Code', monospace;
        }
        html { scroll-behavior: smooth; }
        body {
          background: var(--bg); color: var(--white);
          font-family: var(--fm);
          overflow-x: hidden; -webkit-font-smoothing: antialiased;
          min-height: 100vh;
          display: flex; flex-direction: column;
          justify-content: center; align-items: center;
        }
        ::selection { background: var(--gold); color: #000; }

        .noise {
          position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .04;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
          background-size: 160px;
        }

        .container {
          position: relative; z-index: 1;
          text-align: center;
          padding: 4rem 2rem;
          max-width: 680px;
          animation: fadeUp .8s ease .15s both;
        }

        /* ── Ghost ── */
        .ghost {
          position: absolute; top: 50%; left: 50%;
          transform: translate(-50%,-50%);
          font-family: var(--fd);
          font-size: clamp(10rem, 40vw, 24rem);
          color: transparent;
          -webkit-text-stroke: 1px rgba(200,164,80,.06);
          pointer-events: none; line-height: 1;
          letter-spacing: .03em;
          z-index: 0;
        }

        .content { position: relative; z-index: 1; }

        /* ── Eyebrow ── */
        .eyebrow {
          display: flex; align-items: center; justify-content: center;
          gap: 1rem; margin-bottom: 2rem;
          animation: fadeUp .7s ease .3s both;
        }
        .eyebrow::before {
          content: ''; width: 1.5rem; height: 1px;
          background: var(--gold);
        }
        .eyebrow span {
          font-family: var(--fm); font-size: .55rem;
          letter-spacing: .35em; text-transform: uppercase;
          color: var(--gold);
        }

        /* ── Error Code ── */
        .error-code {
          font-family: var(--fd);
          font-size: clamp(5rem, 16vw, 11rem);
          line-height: .85; letter-spacing: .02em;
          color: var(--white);
          margin-bottom: .5rem;
          animation: fadeUp .8s ease .4s both;
        }
        .error-code .zero {
          color: transparent;
          -webkit-text-stroke: 1.5px var(--gold);
        }

        /* ── Title ── */
        .error-title {
          font-family: var(--fd);
          font-size: clamp(1.6rem, 3vw, 2.6rem);
          letter-spacing: .04em; color: var(--white);
          line-height: 1; margin-bottom: 1.2rem;
          animation: fadeUp .8s ease .5s both;
        }

        /* ── Description ── */
        .error-desc {
          font-family: var(--fsc); font-style: italic;
          font-size: 1rem; line-height: 1.85;
          color: var(--dim);
          max-width: 420px; margin: 0 auto 2.5rem;
          animation: fadeUp .8s ease .55s both;
        }

        /* ── Language ── */
        .lang-wrap {
          display: flex; align-items: center; justify-content: center;
          gap: .5rem; margin-bottom: 2.5rem;
          animation: fadeUp .8s ease .6s both;
        }
        .lang-btn {
          font-family: var(--fm); font-size: .5rem;
          letter-spacing: .18em; text-transform: uppercase;
          padding: .45rem 1rem;
          border: 1px solid var(--brd2);
          background: transparent; color: var(--dim);
          cursor: pointer; transition: all .3s;
        }
        .lang-btn:hover,
        .lang-btn.active {
          border-color: var(--gold); color: var(--gold);
          background: rgba(200,164,80,.08);
        }

        /* ── Language ── */
        .lang-btn {
          font-family: var(--fm); font-size: .5rem;
          letter-spacing: .18em; text-transform: uppercase;
          padding: .45rem 1rem;
          border: 1px solid var(--brd2);
          background: transparent; color: var(--dim);
          cursor: pointer; transition: all .3s;
        }
        .lang-btn:hover,
        .lang-btn.active {
          border-color: var(--gold); color: var(--gold);
          background: rgba(200,164,80,.08);
        }

        /* ── Home Button ── */
        .btn-home {
          display: inline-flex; align-items: center; gap: .7rem;
          background: var(--gold); color: #000;
          font-family: var(--fm); font-size: .55rem;
          font-weight: 700; letter-spacing: .2em;
          text-transform: uppercase; text-decoration: none;
          padding: .85rem 2rem;
          position: relative; overflow: hidden;
          transition: color .3s;
          animation: fadeUp .8s ease .7s both;
        }
        .btn-home::before {
          content: ''; position: absolute; inset: 0;
          background: #fff;
          transform: translateX(-101%);
          transition: transform .4s cubic-bezier(.77,0,.175,1);
        }
        .btn-home:hover { color: var(--gold); }
        .btn-home:hover::before { transform: translateX(0); }
        .btn-home span, .btn-home .arr {
          position: relative; z-index: 1;
        }
        .btn-home .arr { font-size: .9rem; }

        /* ── Animations ── */
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
          .container { padding: 3rem 1.5rem; }
          .error-code { font-size: clamp(3.5rem, 14vw, 6rem); }
          .error-title { font-size: clamp(1.3rem, 2.5vw, 2rem); }

        }
    </style>
</head>
<body>

            <a href="/" class="btn-home" id="home-link">

        const slug = window.location.pathname.split('/').filter(Boolean).pop()?.toLowerCase();
        const match = slug && redirects[slug];
        if (match) {
            const meta = document.createElement('meta');
            meta.httpEquiv = 'refresh';
            meta.content = '0;url=' + match.url;
            document.head.appendChild(meta);
            window.location.replace(match.url);
        }

        const translations = {
            en: {
                eyebrow: 'Error',
                title: 'Page Not Found',
                desc: 'The page you are looking for doesn\'t exist or has been moved. Go back to the home page to continue exploring.',
                btn: 'Home'
            },
            pt: {
                eyebrow: 'Erro',
                title: 'Página Não Encontrada',
                desc: 'A página que procura não existe ou foi movida. Volte à página inicial para continuar explorando.',
                btn: 'Início'
            }
        };

        function changeLanguage(lang) {
            const t = translations[lang];
            document.getElementById('eyebrow-text').textContent = t.eyebrow;
            document.getElementById('error-title').textContent = t.title;
            document.getElementById('error-desc').textContent = t.desc;
            document.getElementById('btn-text').textContent = t.btn;
            document.getElementById('home-link').href = lang === 'pt' ? '/pt' : '/';
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.documentElement.lang = lang;
            localStorage.setItem('makyneta_language', lang);
        }

        window.addEventListener('DOMContentLoaded', () => {
            let lang = localStorage.getItem('makyneta_language');
            if (!lang) {
                const browserLang = navigator.language.split('-')[0];
                lang = ['en', 'pt'].includes(browserLang) ? browserLang : 'en';
            }
            changeLanguage(lang);
        });
    </script>
