<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <!-- Metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Makyneta Unipessoal, Lda."/>
    <!-- Styles -->
    <link rel="stylesheet" href="assets/styles/photo.css">
    <link rel="stylesheet" href="assets/styles/geral.css">
    <!-- Fonnt -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet" />
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="assets/scripts/photo.js" defer></script>
    <script src="assets/scripts/script.js" defer></script>
    <!-- Title -->
    <title>Fotografia | Makyneta</title>
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

  <div id="header"></div>

<main>

  <!-- ══ HERO ══════════════════════════════════════════════════════ -->
  <section id="page-hero">
    <div class="hero-ghost">FOTOGRAFIA</div>
    <div class="eyebrow"><span>Portfólio — Fotografia</span></div>
    <h1 class="hero-title"><em>FOTO</em>GRAFIA</h1>
    <div class="hero-foot">
      <p class="hero-lead">
        Streets, stages, people, places.<br>
        Captured with intention.
      </p>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-num" id="stat-projects">—</div>
          <div class="stat-label">Projectos</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-photos">—</div>
          <div class="stat-label">Fotografias</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ══ FILTER BAR ════════════════════════════════════════════════ -->
  <nav id="filter-bar">
    <div class="filter-tabs" id="filter-tabs"></div>
    <span class="project-counter"><span id="visible-count">—</span> projectos</span>
  </nav>

  <!-- ══ GRID ══════════════════════════════════════════════════════ -->
  <section id="projects" class="reveal">
    <div class="projects-grid" id="projects-grid"></div>
  </section>

</main>

  <div id="footer"></div>

</body>
</html>
