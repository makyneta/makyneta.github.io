<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <!-- Metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Style -->
    <link rel="stylesheet" href="assets/styles/music.css">
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/scripts/music.js" defer></script>
    <script src="assets/scripts/script.js"></script>
    <!-- Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet" />
    <!-- Title_Favicon -->
    <title>Music | Makyneta by Tomás Mota</title>
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
<div class="noise"></div>
<div id="header"></div>

<main>

  <section id="page-hero">
    <div class="hero-ghost">MUSIC</div>
    <div class="eyebrow"><span>Portfolio — Music</span></div>
    <h1 class="hero-title">MU<em>SIC</em></h1>
    <div class="hero-foot">
      <p class="hero-lead">
        Songs, instrumentals, and everything in between.
        Made in Marinha Grande — heard everywhere else.
      </p>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-num" id="stat-releases">—</div>
          <div class="stat-label">Release</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-tracks">01</div>
          <div class="stat-label">Collaboration</div>
        </div>
      </div>
    </div>
  </section>

  <div id="platforms-strip">
    <span class="platforms-label">Listen on</span>
    <div class="platform-links" id="platform-links"></div>
  </div>

  <section id="discography" class="reveal">
    <div class="disco-head">
      <div class="disco-head-left">
        <div class="section-label"><span>Discography</span></div>
        <div class="filter-tabs" id="filter-tabs">
          <button class="filter-tab active" data-type="all">All</button>
          <button class="filter-tab" data-type="album">Albums</button>
          <button class="filter-tab" data-type="ep">EPs</button>
          <button class="filter-tab" data-type="single">Singles</button>
        </div>
      </div>
      <span class="disco-count"><span id="disco-count">—</span> releases</span>
    </div>
    <div class="disco-grid" id="disco-grid"></div>
  </section>

</main>

<div id="footer"></div>
</body>
</html>
