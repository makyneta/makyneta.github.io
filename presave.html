<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Style -->
    <link rel="stylesheet" href="assets/styles/presave.css">
    <link rel="stylesheet" href="assets/styles/geral.css">
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/scripts/presave.js" defer></script>
    <script src="assets/scripts/script.js"></script>
    <!-- Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet" />
    <!-- Title_Favicon -->
    <title>Music | Makyneta by Tomás Mota</title>
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
<div class="noise"></div>
<div id="header"></div>

<main id="presave-page">

  <!-- ══ COVER BG ═══════════════════════════════════════════════ -->
  <div class="cover-bg" id="cover-bg">
    <div class="cover-overlay"></div>
  </div>

  <!-- ══ CONTENT ════════════════════════════════════════════════ -->
  <div class="presave-content">

    <!-- eyebrow -->
    <div class="eyebrow">
      <span class="eyebrow-text" id="eyebrow-text">Makyneta · Release</span>
    </div>

    <!-- title -->
    <h1 class="presave-title" id="presave-title">TÍTULO</h1>
    <p class="presave-artist" id="presave-artist">Makyneta</p>

    <!-- countdown -->
    <div class="countdown-wrap" id="countdown-wrap">
      <p class="countdown-label">Out in</p>
      <div class="countdown" id="countdown">
        <div class="cd-unit">
          <span class="cd-num" id="cd-d">00</span>
          <span class="cd-lbl">Days</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-h">00</span>
          <span class="cd-lbl">Hours</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-m">00</span>
          <span class="cd-lbl">Mins</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-s">00</span>
          <span class="cd-lbl">Secs</span>
        </div>
      </div>
    </div>

    <!-- released state (hidden until countdown hits zero) -->
    <div class="released-wrap" id="released-wrap" style="display:none">
      <div class="released-dot"></div>
      <span class="released-text">Out Now — Redirecting…</span>
    </div>

    <!-- pre-save buttons -->
    <div class="presave-actions" id="presave-actions"></div>

    <!-- date label -->
    <p class="release-date-label" id="release-date-label"></p>

  </div>

  <!-- ══ GHOST WORD ══════════════════════════════════════════════ -->
  <div class="page-ghost" id="page-ghost">SOON</div>

</main>

<div id="footer"></div>

<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║  EDITA APENAS ESTE BLOCO                                     ║
   ╚══════════════════════════════════════════════════════════════╝ */
const CONFIG = {
  title:       "Silêncio (Remix)",
  artist:      "Makyneta, MAYDAY",
  type:        "Single",
  cover:       "/assets/images/projects/music/silencio-remix.jpg",

  /* Data e hora de lançamento — formato ISO: "YYYY-MM-DDTHH:MM:SS"
     Usa a timezone local do servidor/utilizador, ou adiciona offset:
     ex: "2026-05-01T00:00:00+01:00" para Portugal (WEST)          */
  releaseDate: "2026-05-01T00:00:00",

  /* Página para onde redireciona ao chegar a zero               */
  releaseUrl:  "/release/silencio-remix",

  /* Segundos de espera antes do redirect (0 = imediato)         */
  redirectDelay: 0,

  /* Botões de pre-save — deixa [] para esconder a secção        */
  presaveLinks: [
    // { label: "Pre-save no Spotify", icon: "spotify", url: "https://..." },
    // { label: "Pre-save Apple Music", icon: "apple",  url: "https://..." },
  ],
};
/* ╚══════════════════════════════════════════════════════════════╝ */

/* ── Icons ── */
const ICONS = {
  spotify:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`,
  apple:      `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`,
  youtube:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`,
  soundcloud: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.56 8.87V17h8.76c.95 0 1.68-.74 1.68-1.68 0-.93-.74-1.69-1.68-1.69-.1 0-.2.01-.29.03.03-.16.04-.32.04-.49a3.86 3.86 0 0 0-3.87-3.87c-.64 0-1.25.16-1.79.45A3.65 3.65 0 0 0 11.56 8.87zM0 15.32c0 .95.77 1.68 1.68 1.68s1.68-.74 1.68-1.68c0-.95-.75-1.68-1.68-1.68C.75 13.64 0 14.38 0 15.32zM3.68 14.1c-.09-.43-.14-.88-.14-1.34 0-1.88.77-3.58 2-4.8V17h1.65V9.03c.31-.1.63-.15.97-.15.43 0 .84.08 1.22.23V17h1.65V9.27c.26.22.5.46.72.73V17h1.34V8.87c-1.14-1.28-2.8-2.08-4.65-2.08-1.27 0-2.45.38-3.44 1.04a6.43 6.43 0 0 0-1.32.27z"/></svg>`,
  bandcamp:   `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 18.75l7.437-13.5H24l-7.438 13.5z"/></svg>`,
};

/* ── Populate static elements ── */
function init() {
  document.title = `${CONFIG.title} | Makyneta by Tomás Mota`;

  // cover background
  if (CONFIG.cover) {
    document.getElementById('cover-bg').style.backgroundImage = `url('${CONFIG.cover}')`;
  }

  document.getElementById('eyebrow-text').textContent   = `Makyneta · ${CONFIG.type}`;
  document.getElementById('presave-title').textContent  = CONFIG.title;
  document.getElementById('presave-artist').textContent = CONFIG.artist;
  document.getElementById('page-ghost').textContent     = CONFIG.title.split(' ')[0].toUpperCase();

  // release date label
  const target = new Date(CONFIG.releaseDate);
  document.getElementById('release-date-label').textContent =
    target.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  // pre-save buttons
  const actionsEl = document.getElementById('presave-actions');
  if (CONFIG.presaveLinks && CONFIG.presaveLinks.length) {
    actionsEl.innerHTML = CONFIG.presaveLinks.map(l => `
      <a href="${l.url}" target="_blank" rel="noopener" class="presave-btn">
        ${ICONS[l.icon] || ''}<span>${l.label}</span>
      </a>`).join('');
  } else {
    actionsEl.style.display = 'none';
  }
}

/* ── Countdown ── */
let redirected = false;

function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

function tick() {
  const now    = Date.now();
  const target = new Date(CONFIG.releaseDate).getTime();
  const diff   = target - now;

  if (diff <= 0) {
    if (!redirected) {
      redirected = true;
      onZero();
    }
    return;
  }

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000)  / 60000);
  const s = Math.floor((diff % 60000)    / 1000);

  const set = (id, val) => {
    const el  = document.getElementById(id);
    const str = pad(val);
    if (el.textContent !== str) {
      el.textContent = str;
      el.classList.remove('flip');
      void el.offsetWidth;
      el.classList.add('flip');
    }
  };

  set('cd-d', d);
  set('cd-h', h);
  set('cd-m', m);
  set('cd-s', s);
}

function onZero() {
  // swap countdown for "Out Now" badge
  document.getElementById('countdown-wrap').style.display = 'none';
  const releasedWrap = document.getElementById('released-wrap');
  releasedWrap.style.display = 'flex';

  // countdown for redirect label
  let remaining = CONFIG.redirectDelay;

  const updateLabel = () => {
    const el = releasedWrap.querySelector('.released-text');
    if (remaining > 0) {
      el.textContent = `Out Now — Redirecting in ${remaining}…`;
      remaining--;
    } else {
      el.textContent = 'Out Now — Redirecting…';
    }
  };

  updateLabel();

  if (CONFIG.redirectDelay <= 0) {
    window.location.replace(CONFIG.releaseUrl);
    return;
  }

  const interval = setInterval(() => {
    remaining--;
    updateLabel();
    if (remaining < 0) {
      clearInterval(interval);
      window.location.replace(CONFIG.releaseUrl);
    }
  }, 1000);
}

/* ── Start ── */
document.addEventListener('DOMContentLoaded', () => {
  init();
  tick();
  setInterval(tick, 1000);
});
</script>
</body>
</html>
