<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">

    <title>Rua Viva | Makyneta</title>

  <!-- ╔══════════════════════════════════════════════════════════════╗
       ║  EDITA APENAS ESTE BLOCO                                    ║
       ╚══════════════════════════════════════════════════════════════╝ -->
  <script>
  const PROJECT = {
    title:    "Rua Viva",
    subtitle: "",
    year:     "2026",
    location: "Marinha Grande, Portugal",
    desc:     "",
    cover:    "../assets/images/projects/photo/rua-viva/IMG_0127.jpg",

    photos: [
      { src: "../assets/images/projects/photo/rua-viva/IMG_0023.jpg", span: "wide" },
      { src: "../assets/images/projects/photo/rua-viva/IMG_0062.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_0080.jpg", span: "wide" },
      { src: "../assets/images/projects/photo/rua-viva/IMG_0086.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_0104.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_0118.jpg", span: "wide" },
      { src: "../assets/images/projects/photo/rua-viva/IMG_0130.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_0136.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_9964.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_9980.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_9993.jpg", },
      { src: "../assets/images/projects/photo/rua-viva/IMG_9995.jpg", span: "wide" },
      { src: "../assets/images/projects/photo/rua-viva/IMG_9996.jpg", span: "wide" },
      { src: "../assets/images/projects/photo/rua-viva/IMG_9998.jpg", span: "wide" },
    ],
  };
  </script>
  <!-- ╚══════════════════════════════════════════════════════════════╝ -->

  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #080808;
    --bg2:     #0f0f0f;
    --bg3:     #141414;
    --accent:  #31d094;
    --fg:      #f0ede8;
    --dim:     #555;
    --dim2:    #888;
    --border:  rgba(255,255,255,0.07);
    --font-display: 'Bebas Neue', sans-serif;
    --font-serif:   'Cormorant Garamond', serif;
    --font-mono:    'Fira Code', monospace;
    --cell:    280px; /* fixed cell size — change to adjust grid */
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--font-mono);
    overflow-x: hidden; -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: #000; }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 600; opacity: 0.022;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }
  #header { position: relative; z-index: 100; }
  #footer { position: relative; z-index: 2; }

  /* ═══ ANIMATIONS ══════════════════════════════════════════════ */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal {
    opacity: 0; transform: translateY(28px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ═══ HERO ════════════════════════════════════════════════════ */
  #project-hero {
    padding: 9rem 5rem 0;
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
    min-height: 420px; display: flex; flex-direction: column; justify-content: flex-end;
  }

  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    filter: grayscale(0.5) brightness(0.22);
    transform: scale(1.03); transition: transform 10s ease;
  }
  #project-hero:hover .hero-bg { transform: scale(1); }
  .hero-bg-gradient {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to top, var(--bg) 0%, rgba(8,8,8,0.6) 60%, transparent 100%);
  }

  .hero-ghost {
    position: absolute; top: 1rem; right: -1rem; z-index: 1;
    font-family: var(--font-display); font-size: clamp(6rem, 18vw, 18rem);
    color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.025);
    pointer-events: none; line-height: 1; letter-spacing: 0.04em;
  }

  .hero-inner {
    position: relative; z-index: 2;
    padding-bottom: 3.5rem;
  }

  .eyebrow {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;
    opacity: 0; animation: riseIn 0.7s ease 0.15s forwards;
  }
  .eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--accent); display: block; }
  .eyebrow span {
    font-family: var(--font-mono); font-size: 0.56rem;
    letter-spacing: 0.38em; color: var(--accent); text-transform: uppercase;
  }

  .project-title {
    font-family: var(--font-display); font-size: clamp(4rem, 10vw, 10rem);
    line-height: 0.88; letter-spacing: 0.02em; color: var(--fg);
    margin-bottom: 2rem;
    opacity: 0; animation: riseIn 0.8s ease 0.3s forwards;
  }

  .hero-foot {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 1.5rem;
    opacity: 0; animation: riseIn 0.8s ease 0.45s forwards;
  }
  .project-desc {
    font-family: var(--font-serif); font-style: italic; font-weight: 300;
    font-size: clamp(1rem, 1.4vw, 1.2rem); line-height: 1.8;
    color: rgba(240,237,232,0.45); max-width: 480px;
  }
  .hero-meta {
    display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem;
    flex-shrink: 0;
  }
  .meta-item {
    font-family: var(--font-mono); font-size: 0.5rem;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim);
  }
  .meta-item span { color: var(--dim2); }

  /* ═══ PHOTO COUNT STRIP ═══════════════════════════════════════ */
  #photo-strip {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 5rem; border-bottom: 1px solid var(--border);
  }
  .strip-label {
    font-family: var(--font-mono); font-size: 0.5rem;
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim);
  }
  .strip-count {
    font-family: var(--font-mono); font-size: 0.5rem;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
  }
  .strip-count span { color: var(--accent); }

  /* ═══ GALLERY ═════════════════════════════════════════════════ */
  #gallery-section { padding: 0 5rem 7rem; }

  /* Fixed-size grid — always fills full width, no leftover space
     Columns stretch evenly; min size is --cell, max is 1fr       */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--cell), 1fr));
    grid-auto-rows: var(--cell);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border); border-top: none;
  }

  /* ── photo cell ── */
  .photo-cell {
    position: relative; overflow: hidden;
    background: var(--bg3); cursor: pointer;
    /* fixed size from grid, no aspect-ratio override needed */
  }
  /* span modifiers */
  .photo-cell.wide { grid-column: span 2; }
  .photo-cell.tall { grid-row:    span 2; }

  .photo-cell img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    filter: grayscale(0.4) brightness(0.75);
    transform: scale(1.04);
    transition: transform 0.8s cubic-bezier(0.2,0.8,0.2,1), filter 0.6s ease;
  }
  .photo-cell:hover img {
    transform: scale(1); filter: grayscale(0) brightness(0.92);
  }

  .photo-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 0.44rem;
    letter-spacing: 0.2em; color: #252525;
  }

  /* index number */
  .photo-index {
    position: absolute; top: 0.6rem; right: 0.7rem;
    font-family: var(--font-mono); font-size: 0.42rem;
    letter-spacing: 0.12em; color: rgba(255,255,255,0.15);
    z-index: 1; transition: color 0.3s;
    user-select: none;
  }
  .photo-cell:hover .photo-index { color: rgba(255,255,255,0.45); }

  /* expand icon on hover */
  .photo-expand {
    position: absolute; bottom: 0.7rem; right: 0.8rem; z-index: 2;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0); transition: color 0.3s;
  }
  .photo-cell:hover .photo-expand { color: rgba(255,255,255,0.6); }
  .photo-expand svg { width: 14px; height: 14px; }

  /* bottom accent line */
  .photo-cell::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.77,0,0.175,1); z-index: 3;
  }
  .photo-cell:hover::after { transform: scaleX(1); }

  /* ═══ LIGHTBOX ════════════════════════════════════════════════ */
  #lightbox {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(0,0,0,0.96);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(8px);
  }
  #lightbox.open { opacity: 1; pointer-events: all; }

  /* image */
  #lb-img {
    max-width: 92vw; max-height: 82vh;
    object-fit: contain; display: block;
    transform: scale(0.96);
    transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1);
    user-select: none;
  }
  #lightbox.open #lb-img { transform: scale(1); }

  /* caption */
  #lb-caption {
    font-family: var(--font-serif); font-style: italic; font-size: 0.95rem;
    color: rgba(240,237,232,0.4); margin-top: 1.2rem;
    letter-spacing: 0.05em;
  }
  #lb-counter {
    font-family: var(--font-mono); font-size: 0.46rem;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim);
    margin-top: 0.5rem;
  }

  /* close */
  #lb-close {
    position: absolute; top: 1.5rem; right: 2rem;
    font-family: var(--font-mono); font-size: 0.54rem;
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim);
    background: none; border: none; cursor: pointer; transition: color 0.3s;
  }
  #lb-close:hover { color: var(--fg); }

  /* prev / next */
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-family: var(--font-mono); font-size: 1.2rem;
    color: var(--dim); background: none; border: none; cursor: pointer;
    padding: 1rem 1.5rem; transition: color 0.3s;
    user-select: none;
  }
  .lb-nav:hover { color: var(--accent); }
  #lb-prev { left: 0; }
  #lb-next { right: 0; }

  /* ═══ RESPONSIVE ══════════════════════════════════════════════ */
  @media (max-width: 1024px) {
    #project-hero, #gallery-section { padding-left: 2rem; padding-right: 2rem; }
    #photo-strip { padding-left: 2rem; padding-right: 2rem; }
    :root { --cell: 200px; }
  }
  @media (max-width: 640px) {
    :root { --cell: calc((100vw - 4rem - 1px) / 2); }
    .photo-cell.wide { grid-column: span 1; } /* disable wide on small screens */
    .hero-foot { flex-direction: column; }
    .hero-meta  { align-items: flex-start; }
  }
  </style>
</head>
<body>
<div class="noise"></div>
<div id="header"></div>

<main>

  <!-- ══ HERO ══════════════════════════════════════════════════════ -->
  <section id="project-hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-bg-gradient"></div>
    <div class="hero-ghost" id="hero-ghost"></div>
    <div class="hero-inner">
      <div class="eyebrow"><span id="eyebrow-label">Fotografia</span></div>
      <h1 class="project-title" id="project-title"></h1>
      <div class="hero-foot">
        <p class="project-desc" id="project-desc"></p>
        <div class="hero-meta">
          <span class="meta-item" id="meta-year"></span>
          <span class="meta-item" id="meta-location"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- ══ STRIP ═════════════════════════════════════════════════════ -->
  <div id="photo-strip">
    <span class="strip-label">Galeria</span>
    <span class="strip-count"><span id="photo-count">—</span> fotografias</span>
  </div>

  <!-- ══ GALLERY ═══════════════════════════════════════════════════ -->
  <section id="gallery-section" class="reveal">
    <div class="photo-grid" id="photo-grid"></div>
  </section>

</main>

<!-- ══ LIGHTBOX ══════════════════════════════════════════════════ -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button id="lb-close" aria-label="Close">Fechar ✕</button>
  <button class="lb-nav" id="lb-prev" aria-label="Previous">←</button>
  <img id="lb-img" src="" alt="" draggable="false" />
  <button class="lb-nav" id="lb-next" aria-label="Next">→</button>
  <p id="lb-caption"></p>
  <p id="lb-counter"></p>
</div>

<div id="footer"></div>

<script>
/* ── Populate hero ── */
function initHero() {
  document.getElementById('project-title').textContent = PROJECT.title;
  document.getElementById('project-desc').textContent  = PROJECT.desc;
  document.getElementById('hero-ghost').textContent    = PROJECT.title.split(' ')[0].toUpperCase();

  if (PROJECT.subtitle) {
    document.getElementById('eyebrow-label').textContent = `Photography — ${PROJECT.subtitle}`;
  }
  if (PROJECT.cover) {
    document.getElementById('hero-bg').style.backgroundImage = `url('${PROJECT.cover}')`;
  }
  if (PROJECT.year) {
    document.getElementById('meta-year').innerHTML = `<span>${PROJECT.year}</span>`;
  }
  if (PROJECT.location) {
    document.getElementById('meta-location').innerHTML = `<span>${PROJECT.location}</span>`;
  }
}

/* ── Build gallery grid ── */
function buildGrid() {
  const grid = document.getElementById('photo-grid');
  const photos = PROJECT.photos || [];

  document.getElementById('photo-count').textContent = photos.length;

  photos.forEach((photo, i) => {
    const cell = document.createElement('div');
    cell.className = 'photo-cell reveal';
    if (photo.span === 'wide') cell.classList.add('wide');
    if (photo.span === 'tall') cell.classList.add('tall');
    cell.dataset.index = i;

    cell.innerHTML = photo.src
      ? `<img src="${photo.src}" alt="${photo.alt || ''}" loading="lazy" />`
      : `<div class="photo-placeholder">[ ${String(i + 1).padStart(2,'0')} ]</div>`;

    cell.insertAdjacentHTML('beforeend', `
      <span class="photo-index">${String(i + 1).padStart(2,'0')}</span>
      <span class="photo-expand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </span>`);

    cell.addEventListener('click', () => openLightbox(i));
    grid.appendChild(cell);
  });

  // scroll reveal
  document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
}

/* ═══ LIGHTBOX ════════════════════════════════════════════════════ */
const lb       = document.getElementById('lightbox');
const lbImg    = document.getElementById('lb-img');
const lbCap    = document.getElementById('lb-caption');
const lbCount  = document.getElementById('lb-counter');
let currentIdx = 0;

function openLightbox(idx) {
  currentIdx = idx;
  renderLb();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLb() {
  const photos = PROJECT.photos;
  const p = photos[currentIdx];
  if (!p) return;

  lbImg.style.opacity = '0';
  lbImg.style.transform = 'scale(0.97)';

  lbImg.onload = () => {
    lbImg.style.transition = 'opacity 0.3s ease, transform 0.35s ease';
    lbImg.style.opacity    = '1';
    lbImg.style.transform  = 'scale(1)';
  };

  if (p.src) {
    lbImg.src = p.src;
    lbImg.alt = p.alt || '';
    lbImg.style.display = 'block';
  } else {
    lbImg.style.display = 'none';
  }

  lbCap.textContent   = p.alt || '';
  lbCount.textContent = `${currentIdx + 1} / ${photos.length}`;
}

function closeLb() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { lbImg.src = ''; }, 350);
}

function prevPhoto() {
  currentIdx = (currentIdx - 1 + PROJECT.photos.length) % PROJECT.photos.length;
  renderLb();
}
function nextPhoto() {
  currentIdx = (currentIdx + 1) % PROJECT.photos.length;
  renderLb();
}

document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', prevPhoto);
document.getElementById('lb-next').addEventListener('click', nextPhoto);

lb.addEventListener('click', e => {
  if (e.target === lb) closeLb();
});

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')    closeLb();
  if (e.key === 'ArrowLeft') prevPhoto();
  if (e.key === 'ArrowRight') nextPhoto();
});

/* swipe on mobile */
let touchStartX = 0;
lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
lb.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? nextPhoto() : prevPhoto();
});

/* ── Scroll reveal ── */
const revealObs = new IntersectionObserver(
  entries => entries.forEach(e => e.isIntersecting && e.target.classList.add('visible')),
  { threshold: 0.04 }
);

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  initHero();
  buildGrid();
});
</script>
</body>
</html>
