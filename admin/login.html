<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login | Makyneta Admin</title>
    <link rel="icon" href="/assets/images/ui/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-box">
    <div class="logo">MAKYN<span class="gold">E</span>TA</div>
    <p class="sub">Admin Access</p>

    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@makyneta.pt" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" required>
      </div>
      <p class="error" id="login-error"></p>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;

      if (email === 'admin@makyneta.pt' && pass === 'makyneta2024') {
        localStorage.setItem('makyneta_admin', 'true');
        window.location.href = '/admin';
        return false;
      }

      document.getElementById('login-error').textContent = 'Invalid email or password.';
      return false;
    }

    if (localStorage.getItem('makyneta_admin') === 'true') {
      window.location.href = '/admin';
    }
  </script>
</body>
</html>
