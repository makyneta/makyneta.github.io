<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Makyneta Unipessoal, Lda."/>
  <meta property="og:image" content="https://makyneta.github.io/assets/images/ui/og-image.webp">
  <meta name="twitter:image" content="https://makyneta.github.io/assets/images/ui/og-image.webp">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/assets/styles/geral.css">
  <link rel="stylesheet" href="/assets/styles/project.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Sofia+Sans+Extra+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/scripts/script.js"></script>

  <title><!-- NOME DO PROJETO --> | Makyneta</title>
  <link rel="icon" href="/assets/images/ui/favicon.png" type="image/png">
</head>
<body>
  <div id="progress"></div>
  <div class="noise"></div>
  <div id="header"></div>

  <main>

    <!-- ══ VOLTAR ════════════════════════════════════════════════ -->
    <!-- Ajustar href conforme a categoria:
         Desenvolvimento → /pt/develop
         Design           → /pt/design
         Fotografia       → /pt/photo
         Vídeo            → /pt/video   -->
    <a href="/pt/develop" class="project-back">
      <i class="fa-solid fa-arrow-left"></i> Voltar ao Portfólio
    </a>

    <!-- ══ BANNER ═════════════════════════════════════════════════ -->
    <section class="project-hero">
      <div class="project-banner">
        <!-- Substituir src pela imagem do projeto.
             Dev:    /assets/images/projects/dev/<imagem>
             Design: /assets/images/projects/design/preview/<imagem>
             Foto:   /assets/images/projects/photo/<imagem>
             Vídeo:  /assets/images/projects/video/<imagem> -->
        <img src="/assets/images/projects/dev/exemplo.webp" alt="Nome do Projeto">
        <!-- Se não houver imagem, descomentar abaixo e remover img:
        <div class="no-img">NOME DO PROJETO</div> -->
      </div>
    </section>

    <!-- ══ CABEÇALHO DO PROJETO ══════════════════════════════════ -->
    <header class="project-header">
      <div class="project-category">
        <!-- Mudar label conforme a categoria:
             "Front-end" / "Fullstack" / "Back-end" para dev
             "Branding" / "UI" / "Print" / "Redes Sociais" / "Evento" para design
             "Evento" / "Desporto" / "Retrato" / "Rua" / "Natureza" para foto
             "Comercial" / "Evento" / "Documentário" para vídeo -->
        <span>Desenvolvimento</span>
        <span class="dot"></span>
        <!-- Ano -->
        <span>2025</span>
      </div>

      <h1 class="project-title"><!-- Título do Projeto --></h1>

      <div class="project-meta">
        <!-- Opcional: nome do cliente -->
        <span><i class="fa-solid fa-user"></i> <!-- Nome do Cliente --></span>
        <!-- Opcional: localização -->
        <span><i class="fa-solid fa-location-dot"></i> <!-- Localização --></span>
        <!-- Opcional: duração -->
        <span><i class="fa-solid fa-calendar"></i> <!-- Duração --></span>
      </div>
    </header>

    <!-- ══ CONTEÚDO ══════════════════════════════════════════════ -->
    <div class="project-content">

      <!-- ── Visão Geral ── -->
      <section class="project-section">
        <h2>Visão Geral</h2>
        <p><!-- Descrição detalhada do projeto. O que é, que problema resolve, o que o torna único. 2-4 parágrafos. --></p>
      </section>

      <!-- ── Propósito ── -->
      <section class="project-section">
        <h2>Propósito</h2>
        <p><!-- Para que serve este projeto? Público-alvo, objetivos, impacto. Porque foi criado/construído? --></p>
      </section>

      <!-- ── Feedback do Cliente ── -->
      <!-- Remover esta secção inteira se o projeto não tiver feedback -->
      <section class="project-section">
        <h2>Feedback do Cliente</h2>
        <div class="feedback-block">
          <p class="feedback-quote"><!-- "Testemunho do cliente. O que disse sobre trabalhar connosco e o resultado final." --></p>
          <div class="feedback-author">
            <div class="feedback-author-avatar"><!-- Iniciais --></div>
            <div class="feedback-author-info">
              <span class="feedback-author-name"><!-- Nome do Cliente --></span>
              <span class="feedback-author-role"><!-- Cargo / Empresa --></span>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Tecnologias / Ferramentas ── -->
      <section class="project-section">
        <!-- Mudar título: "Tecnologias" para dev, "Ferramentas" para design/foto/vídeo -->
        <h2>Tecnologias</h2>
        <div class="project-tags">
          <!-- Tags dev: React, Node.js, TypeScript, Python, etc. Usar class="dev" -->
          <!-- Tags design: Illustrator, Photoshop, Figma, etc. Usar class="design" -->
          <span class="project-tag dev"><!-- Tag --></span>
          <span class="project-tag dev"><!-- Tag --></span>
          <span class="project-tag dev"><!-- Tag --></span>
          <span class="project-tag dev"><!-- Tag --></span>
        </div>
      </section>

      <!-- ── Links / Ações ── -->
      <section class="project-section">
        <h2>Links</h2>
        <div class="project-actions">
          <!-- Para projetos de DESENVOLVIMENTO: botões Repositório + Demo -->
          <a href="https://github.com/makyneta/<!-- repo -->" target="_blank" rel="noopener noreferrer" class="project-btn project-btn-primary">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.57v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.68.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            Ver Repositório
          </a>
          <a href="https://<!-- demo-url -->" target="_blank" rel="noopener noreferrer" class="project-btn project-btn-outline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Demo Online
          </a>

          <!-- Para projetos de DESIGN / FOTO / VÍDEO: substituir os dois botões acima por:
          <a href="/pt/contacto" class="project-btn project-btn-primary">
            <i class="fa-solid fa-envelope"></i> Mais Informações
          </a>
          -->
        </div>
      </section>

    </div>

    <!-- ══ GALERIA (opcional) ═════════════════════════════════════ -->
    <!-- Remover esta secção se não houver imagens adicionais -->
    <section class="project-gallery">
      <h2>Galeria</h2>
      <div class="gallery-grid">
        <img src="/assets/images/projects/dev/<!-- imagem-1 -->" alt="Screenshot 1">
        <img src="/assets/images/projects/dev/<!-- imagem-2 -->" alt="Screenshot 2">
        <img src="/assets/images/projects/dev/<!-- imagem-3 -->" alt="Screenshot 3">
      </div>
    </section>

  </main>

  <div id="footer"></div>
</body>
</html>
