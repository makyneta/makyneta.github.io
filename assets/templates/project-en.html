<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Makyneta Unipessoal, Lda."/>
  <meta property="og:image" content="https://makyneta.github.io/assets/images/ui/og-image.webp">
  <meta name="twitter:image" content="https://makyneta.github.io/assets/images/ui/og-image.webp">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/assets/styles/geral.css">
  <link rel="stylesheet" href="/assets/styles/project.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Sofia+Sans+Extra+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/scripts/script.js"></script>

  <title><!-- PROJECT NAME --> | Makyneta</title>
  <link rel="icon" href="/assets/images/ui/favicon.png" type="image/png">
</head>
<body>
  <div id="progress"></div>
  <div class="noise"></div>
  <div id="header"></div>

  <main>

    <!-- ══ BACK LINK ══════════════════════════════════════════════ -->
    <!-- Adjust href based on category:
         Development → /develop
         Design      → /design
         Photography → /photo
         Video       → /video   -->
    <a href="/develop" class="project-back">
      <i class="fa-solid fa-arrow-left"></i> Back to Portfolio
    </a>

    <!-- ══ BANNER ═════════════════════════════════════════════════ -->
    <section class="project-hero">
      <div class="project-banner">
        <!-- Replace src with project hero image.
             For dev projects:   /assets/images/projects/dev/<image>
             For design:          /assets/images/projects/design/preview/<image>
             For photo:           /assets/images/projects/photo/<image>
             For video:           /assets/images/projects/video/<image> -->
        <img src="/assets/images/projects/dev/example.webp" alt="Project Name">
        <!-- If no image, uncomment below and remove img above:
        <div class="no-img">PROJECT NAME</div> -->
      </div>
    </section>

    <!-- ══ PROJECT HEADER ════════════════════════════════════════ -->
    <header class="project-header">
      <div class="project-category">
        <!-- Change category label:
             "Front-end" / "Fullstack" / "Back-end" for dev
             "Branding" / "UI" / "Print" / "Social Media" / "Event" for design
             "Event" / "Sport" / "Portrait" / "Street" / "Nature" for photo
             "Commercial" / "Event" / "Documentary" for video -->
        <span>Development</span>
        <span class="dot"></span>
        <!-- Year -->
        <span>2025</span>
      </div>

      <h1 class="project-title"><!-- Project Title --></h1>

      <div class="project-meta">
        <!-- Optional: client name -->
        <span><i class="fa-solid fa-user"></i> <!-- Client Name --></span>
        <!-- Optional: location -->
        <span><i class="fa-solid fa-location-dot"></i> <!-- Location --></span>
        <!-- Optional: duration -->
        <span><i class="fa-solid fa-calendar"></i> <!-- Duration --></span>
      </div>
    </header>

    <!-- ══ CONTENT ═══════════════════════════════════════════════ -->
    <div class="project-content">

      <!-- ── Overview ── -->
      <section class="project-section">
        <h2>Overview</h2>
        <p><!-- Detailed project description. What is this project, what problem does it solve, what makes it unique. 2-4 paragraphs. --></p>
      </section>

      <!-- ── Purpose ── -->
      <section class="project-section">
        <h2>Purpose</h2>
        <p><!-- What is this project for? Target audience, goals, impact. Why was it built/created? --></p>
      </section>

      <!-- ── Client Feedback ── -->
      <!-- Remove this section entirely if the project has no client feedback -->
      <section class="project-section">
        <h2>Client Feedback</h2>
        <div class="feedback-block">
          <p class="feedback-quote"><!-- "Client testimonial quote. What the client said about working with us and the end result." --></p>
          <div class="feedback-author">
            <div class="feedback-author-avatar"><!-- Initials -- ></div>
            <div class="feedback-author-info">
              <span class="feedback-author-name"><!-- Client Name --></span>
              <span class="feedback-author-role"><!-- Role / Company --></span>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Technologies / Tools ── -->
      <section class="project-section">
        <!-- Change heading: "Technologies" for dev, "Tools" for design/photo/video -->
        <h2>Technologies</h2>
        <div class="project-tags">
          <!-- Dev tags: React, Node.js, TypeScript, Python, etc. Use class="dev" -->
          <!-- Design tags: Illustrator, Photoshop, Figma, etc. Use class="design" -->
          <span class="project-tag dev"><!-- Tag --></span>
          <span class="project-tag dev"><!-- Tag --></span>
          <span class="project-tag dev"><!-- Tag --></span>
          <span class="project-tag dev"><!-- Tag --></span>
        </div>
      </section>

      <!-- ── Actions ── -->
      <section class="project-section">
        <h2>Links</h2>
        <div class="project-actions">
          <!-- For DEVELOPMENT projects: show Repo + Demo buttons -->
          <a href="https://github.com/makyneta/<!-- repo -->" target="_blank" rel="noopener noreferrer" class="project-btn project-btn-primary">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.57v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.68.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            View Repository
          </a>
          <a href="https://<!-- demo-url -->" target="_blank" rel="noopener noreferrer" class="project-btn project-btn-outline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Live Demo
          </a>

          <!-- For DESIGN / PHOTO / VIDEO projects: replace the two buttons above with:
          <a href="/contact" class="project-btn project-btn-primary">
            <i class="fa-solid fa-envelope"></i> More Info
          </a>
          -->
        </div>
      </section>

    </div>

    <!-- ══ GALLERY (optional) ════════════════════════════════════ -->
    <!-- Remove this entire section if there are no additional images -->
    <section class="project-gallery">
      <h2>Gallery</h2>
      <div class="gallery-grid">
        <img src="/assets/images/projects/dev/<!-- image-1 -->" alt="Project screenshot 1">
        <img src="/assets/images/projects/dev/<!-- image-2 -->" alt="Project screenshot 2">
        <img src="/assets/images/projects/dev/<!-- image-3 -->" alt="Project screenshot 3">
      </div>
    </section>

  </main>

  <div id="footer"></div>
</body>
</html>
