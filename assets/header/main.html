<header id="main-header">
  <a href="/" class="header-logo">
    <img src="/assets/images/ui/header_old.png" alt="Makyneta" class="header-logo-img">
  </a>

  <nav class="header-nav">
    <a href="/about" class="nav-link">About</a>

    <div class="dropdown-wrapper">
      <button class="nav-btn">
        Portfolio
        <i class="fa-solid fa-chevron-down" style="font-size:.4rem;opacity:.5"></i>
      </button>
      <div class="dropdown-menu">
        <a href="/develop"><i class="fa-solid fa-code"></i> Development</a>
        <a href="/design"><i class="fa-solid fa-paint-brush"></i> Design</a>
        <a href="/photo"><i class="fa-solid fa-camera"></i> Photography</a>
        <a href="/video"><i class="fa-solid fa-video"></i> Video</a>
        <a href="/feedback"><i class="fa-solid fa-star"></i> Feedback</a>
      </div>
    </div>

    <a href="/contact" class="nav-link">Contact</a>

    <div class="dropdown-wrapper dropdown-left">
      <button class="nav-btn lang-btn">
        <i class="fa-solid fa-globe" style="font-size:.5rem"></i>
        EN
        <i class="fa-solid fa-chevron-down" style="font-size:.4rem;opacity:.5"></i>
      </button>
      <div class="dropdown-menu">
        <a href="/pt"><i class="fa-solid fa-arrow-right" style="font-size:.4rem"></i> Português</a>
      </div>
    </div>
  </nav>

  <button id="mobile-menu-toggle-btn" aria-label="Toggle menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <div id="mobile-menu-backdrop" class="hidden"></div>

  <nav id="mobile-sidebar-nav">
    <div class="mobile-menu-inner">
      <div class="mobile-menu-logo">MAKYNETA</div>

      <ul id="main-nav-list">
        <li><a href="/" class="mobile-nav-link">Home</a></li>
        <li><a href="/about" class="mobile-nav-link">About</a></li>

        <li><span class="mobile-section-label">Portfolio</span></li>
        <li><a href="/develop" class="mobile-sub-link">Development</a></li>
        <li><a href="/design" class="mobile-sub-link">Design</a></li>
        <li><a href="/photo" class="mobile-sub-link">Photography</a></li>
        <li><a href="/video" class="mobile-sub-link">Video</a></li>
        <li><a href="/feedback" class="mobile-sub-link">Feedback</a></li>

        <li><a href="/contact" class="mobile-nav-link">Contact</a></li>
      </ul>

      <div class="mobile-menu-footer">
        <a href="/pt" class="mobile-lang">Português</a>
      </div>
    </div>
  </nav>

  <script>
    (function(){
      var path = window.location.pathname;
      // Mark direct nav links
      document.querySelectorAll('#main-header .nav-link').forEach(function(el){
        if (el.getAttribute('href') === path) el.classList.add('active');
      });
      // Mark Portfolio button if on a portfolio sub-page
      if (path.match(/^\/(develop|design|photo|video|feedback)/)) {
        document.querySelectorAll('#main-header .nav-btn')[0].classList.add('active');
      }
      // Mobile active
      document.querySelectorAll('#mobile-sidebar-nav a').forEach(function(el){
        if (el.getAttribute('href') === path) el.style.color = '#c8a450';
      });
    })();
  </script>
</header>
