<header id="main-header">
  <a href="/pt" class="header-logo">
    <img src="/assets/images/ui/header_old.png" alt="Makyneta" class="header-logo-img">
  </a>

  <nav class="header-nav">
    <a href="/pt/sobre" class="nav-link">Sobre</a>

    <div class="dropdown-wrapper">
      <button class="nav-btn">
        Portfolio
        <i class="fa-solid fa-chevron-down" style="font-size:.4rem;opacity:.5"></i>
      </button>
      <div class="dropdown-menu">
        <a href="/pt/develop"><i class="fa-solid fa-code"></i> Desenvolvimento</a>
        <a href="/pt/design"><i class="fa-solid fa-paint-brush"></i> Design</a>
        <a href="/pt/photo"><i class="fa-solid fa-camera"></i> Fotografia</a>
        <a href="/pt/video"><i class="fa-solid fa-video"></i> Vídeo</a>
        <a href="/pt/feedback"><i class="fa-solid fa-star"></i> Feedback</a>
      </div>
    </div>

    <a href="/pt/contacto" class="nav-link">Contacto</a>

    <div class="dropdown-wrapper dropdown-left">
      <button class="nav-btn lang-btn">
        <i class="fa-solid fa-globe" style="font-size:.5rem"></i>
        PT
        <i class="fa-solid fa-chevron-down" style="font-size:.4rem;opacity:.5"></i>
      </button>
      <div class="dropdown-menu">
        <a href="/"><i class="fa-solid fa-arrow-right" style="font-size:.4rem"></i> English</a>
      </div>
    </div>
  </nav>

  <button id="mobile-menu-toggle-btn" aria-label="Menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <div id="mobile-menu-backdrop" class="hidden"></div>

  <nav id="mobile-sidebar-nav">
    <div class="mobile-menu-inner">
      <div class="mobile-menu-logo">MAKYNETA</div>

      <ul id="main-nav-list">
        <li><a href="/pt" class="mobile-nav-link">Início</a></li>
        <li><a href="/pt/sobre" class="mobile-nav-link">Sobre</a></li>

        <li><span class="mobile-section-label">Portfolio</span></li>
        <li><a href="/pt/develop" class="mobile-sub-link">Desenvolvimento</a></li>
        <li><a href="/pt/design" class="mobile-sub-link">Design</a></li>
        <li><a href="/pt/photo" class="mobile-sub-link">Fotografia</a></li>
        <li><a href="/pt/video" class="mobile-sub-link">Vídeo</a></li>
        <li><a href="/pt/feedback" class="mobile-sub-link">Feedback</a></li>

        <li><a href="/pt/contacto" class="mobile-nav-link">Contacto</a></li>
      </ul>

      <div class="mobile-menu-footer">
        <a href="/" class="mobile-lang">English</a>
      </div>
    </div>
  </nav>

  <script>
    (function(){
      var path = window.location.pathname;
      document.querySelectorAll('#main-header .nav-link').forEach(function(el){
        if (el.getAttribute('href') === path) el.classList.add('active');
      });
      if (path.match(/^\/pt\/(develop|design|photo|video|feedback)/)) {
        document.querySelectorAll('#main-header .nav-btn')[0].classList.add('active');
      }
      document.querySelectorAll('#mobile-sidebar-nav a').forEach(function(el){
        if (el.getAttribute('href') === path) el.style.color = '#c8a450';
      });
    })();
  </script>
</header>
