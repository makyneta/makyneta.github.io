<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <!-- Metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Makyneta Unipessoal, Lda."/>
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Style -->
    <link rel="stylesheet" href="assets/styles/design.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet" />
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/scripts/design.js" defer></script>
    <script src="assets/scripts/script.js"></script>
    <!-- Title_Favicon-->
    <title>Design | Makyneta by Tomás Mota</title>
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
<div class="noise"></div>
<div id="header"></div>

<main>

  <!-- ══ HERO ══════════════════════════════════════════════════════ -->
  <section id="page-hero">
    <div class="hero-ghost">DESIGN</div>
    <div class="eyebrow"><span>Portfólio — Design</span></div>
    <h1 class="hero-title">DE<em>SIGN</em></h1>
    <div class="hero-foot">
      <p class="hero-lead">
        Identidade visual, sistemas de marca, impressão e layouts digitais —
        construídos com intenção. Design que comunica antes de decorar.
      </p>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-num" id="stat-projects">—</div>
          <div class="stat-label">Projetos</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-clients">—</div>
          <div class="stat-label">Tipos</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ══ FILTER BAR ════════════════════════════════════════════════ -->
  <nav id="filter-bar">
    <div class="filter-tabs" id="filter-tabs"><!-- JS --></div>
    <span class="project-counter"><span id="visible-count">—</span> projetos</span>
  </nav>

  <!-- ══ PROJECTS ══════════════════════════════════════════════════ -->
  <section id="projects" class="reveal">
    <div class="projects-grid" id="projects-grid"></div>
  </section>

</main>

<!-- ══ LIGHTBOX ══════════════════════════════════════════════════ -->
<div id="lightbox">
  <button id="lightbox-close">Fechar ✕</button>
  <img id="lightbox-img" src="" alt="" />
  <span id="lightbox-caption"></span>
</div>

<div id="footer"></div>

<script>

</script>
</body>
</html>
