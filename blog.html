<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Makyneta Unipessoal, Lda."/>
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Styles -->
    <link rel="stylesheet" href="assets/styles/geral.css">
    <link rel="stylesheet" href="assets/styles/blog.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet" />
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/scripts/blog.js"></script>
    <script src="assets/scripts/script.js"></script>
    <!-- Title_Favicon -->
    <title>Blog | Makyneta by Tomás Mota</title>
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
<div class="noise"></div>
<div id="header"></div>

<main>

  <!-- ══ PAGE HERO ════════════════════════════════════════════════ -->
  <section id="blog-hero">
    <div class="hero-bg-word">BLOG</div>
    <div class="blog-eyebrow"><span>Makyneta — Editorial</span></div>
    <h1 class="blog-title">THE <em>BLOG</em></h1>
  </section>

  <!-- ══ DATELINE ══════════════════════════════════════════════════ -->
  <div class="blog-dateline">
    <span class="dateline-left">Leiria, Portugal · <span id="today-date"></span></span>
    <span class="dateline-right"><span id="article-total">—</span> artigos publicados</span>
  </div>

  <!-- ══ CONTROLS (sticky) ════════════════════════════════════════ -->
  <div id="blog-controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search articles…" autocomplete="off" />
    </div>
    <div class="filter-tabs" id="filter-tabs"><!-- JS --></div>
  </div>

  <!-- ══ FEATURED ══════════════════════════════════════════════════ -->
  <div id="featured-wrap"><!-- JS --></div>

  <!-- ══ GRID ══════════════════════════════════════════════════════ -->
  <section id="articles-section">
    <div class="section-header">
      <span class="section-hdr-label">Todos os Artigos</span>
      <span class="article-count"><span id="visible-count">—</span> resultados</span>
    </div>
    <div class="articles-grid" id="articles-grid"></div>
    <div id="no-results"><p>Nenhum artigo encontrado.</p></div>
  </section>

</main>
<div id="footer"></div>
</body>

</html>
