<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Makyneta Unipessoal, Lda."/>
    <meta property="og:image" content="https://makyneta.github.io/assets/images/ui/og-image.webp">
    <meta name="twitter:image" content="https://makyneta.github.io/assets/images/ui/og-image.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="assets/styles/geral.css">
    <link rel="stylesheet" href="assets/styles/video.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/scripts/video.js" defer></script>
    <script src="assets/scripts/script.js"></script>
    <title>Video | Makyneta</title>
    <link rel="icon" href="assets/images/ui/favicon.png" type="image/png">
</head>
<body>
  <div id="bar"></div>
  <div id="header"></div>

  <main>
    <section id="page-hero">
      <div class="hero-ghost">VIDEO</div>
      <div class="eyebrow"><span>Portfolio — Video</span></div>
      <h1 class="hero-title">VI<span class="outline">DEO</span></h1>
      <div class="hero-foot">
        <p class="hero-lead">
          Motion, editing, and short-form content — from event coverage
          to narrative storytelling.
        </p>
      </div>
    </section>

    <section id="video-section" class="reveal">
      <div class="video-grid" id="video-grid"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    const VIDEOS = [
  {
    title: 'Presentation of Ricardo Lopes Candidacy',
    desc: 'Video presentation of Ricardo Lopes candidacy for the Political Commission of the Socialist Party of Marinha Grande.',
    client: 'PS Marinha Grande',
    embed: 'https://www.youtube.com/embed/Igmi2JkPEwk',
    thumbnail: 'assets/images/projects/video/apresentacao-ricardo-lopes-2026.webp',
    link: 'https://youtu.be/Igmi2JkPEwk'
  },

  {
    title: 'Neuton Marques @ Todos pela Marinha',
    desc: 'Video of Neuton Marques live performance at the "Todos pela Marinha" event.',
    client: 'Neuton Marques',
    embed: 'https://www.youtube.com/embed/CCtTfm1G7jc',
    thumbnail: 'assets/images/projects/video/neuton-marques-live-at-todos-pela-marinha.webp',
    link: 'https://youtu.be/CCtTfm1G7jc'
  },
];

    function renderVideos() {
      const grid = document.getElementById('video-grid');
      if (!grid) return;

      if (!VIDEOS.length) return;

      grid.innerHTML = VIDEOS.map(v => `
        <a class="v-card" href="${v.link}" target="_blank" rel="noopener">
          <div class="v-thumb-wrap">
            <img class="v-thumb" src="${v.thumbnail}" alt="${v.title}" loading="lazy">
            <div class="v-play">
              <div class="v-play-btn"></div>
            </div>
          </div>
          <div class="v-body">
            ${v.client ? `<div class="v-client">${v.client}</div>` : ''}
            <div class="v-title">${v.title}</div>
            ${v.desc ? `<div class="v-desc">${v.desc}</div>` : ''}
            <span class="v-link">Ver projeto →</span>
          </div>
        </a>
      `).join('');
    }

    renderVideos();
  </script>
</body>
</html>
